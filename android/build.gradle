buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.2")
    }
}

apply plugin: "com.facebook.react.rootproject"

// Fix for legacy packages that still reference jcenter() which was shut down in 2022.
// This substitutes jcenter() with mavenCentral() for ALL subprojects (including node_modules).
allprojects {
    buildscript {
        repositories {
            google()
            mavenCentral()
        }
    }
    repositories {
        google()
        mavenCentral()
        maven { url "https://jitpack.io" }
        // Redirect any jcenter() calls from legacy packages to mavenCentral()
        maven { url "https://repo1.maven.org/maven2" }
    }
    // Override jcenter() for all subprojects so legacy build.gradle files don't fail
    configurations.all {
        resolutionStrategy.eachDependency { DependencyResolveDetails details ->
            // No-op: just ensures resolution happens through our declared repos above
        }
    }
}
